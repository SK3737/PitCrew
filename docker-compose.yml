services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: pitcrew
      POSTGRES_PASSWORD: pitcrew
      POSTGRES_DB: pitcrew
    ports:
      - "5432:5432"
    volumes:
      - pitcrew_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitcrew -d pitcrew"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://pitcrew:pitcrew@db:5432/pitcrew
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pitcrew_pgdata:
