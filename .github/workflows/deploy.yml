name: Deploy

# Task 9.5 - inert, unexecuted infrastructure-as-code. This workflow has
# never been run in this environment (no GitHub Actions runner, no Render/
# Vercel accounts, no deploy tokens - see .superpowers/sdd/task-9-report.md,
# "What is out of scope"). It is written as plausible, correct CI/CD for a
# human to activate once real accounts and secrets exist:
#
#   - RENDER_DEPLOY_HOOK_URL: a Render web service's deploy hook URL
#     (Render dashboard -> service -> Settings -> Deploy Hook). Triggering
#     it is enough to redeploy; Render's own build then reads render.yaml.
#   - VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID: from `vercel link`
#     run once locally, then copied into this repo's GitHub Actions secrets.
#
# None of these secrets exist in this repository today. Every `${{ secrets.* }}`
# reference below resolves to an empty string until a human adds them, at
# which point this workflow starts working without any further changes.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy-backend:
    name: Deploy backend (Render)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set - skipping (see this workflow's header)."
            exit 0
          fi
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  deploy-frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install the Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        working-directory: frontend
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "VERCEL_TOKEN is not set - skipping (see this workflow's header)."
            exit 0
          fi
          vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
          vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
          vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
